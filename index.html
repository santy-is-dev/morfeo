<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Morfeo</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(180deg,#050816,#0c1230,#161f48);
            color:white;
            overflow:hidden;
        }

        .contenedor{
            text-align:center;
            max-width:700px;
            padding:40px;
        }

        h1{
            font-size:64px;
            margin-bottom:20px;
        }

        p{
            font-size:22px;
            color:#d7ddff;
            margin-bottom:45px;
            line-height:1.5;
        }

        button{
            padding:16px 40px;
            font-size:18px;
            border:none;
            border-radius:50px;
            cursor:pointer;
            background:white;
            color:#111;
            transition:.3s;
        }

        button:hover{
            transform:scale(1.05);
        }
    </style>
</head>

<body>

<div class="contenedor">

<h1>Morfeo</h1>

<p>
Donde las ideas sueñan antes de convertirse en proyectos.
</p>

<button>Entrar</button>

</div>

</body>
</html>
